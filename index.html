<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgSeek - Image Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-bottom: 1px solid #2a2a4a;
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .header h1 span {
            color: #6c63ff;
        }

        .header p {
            color: #888;
            font-size: 0.95rem;
        }

        .search-bar {
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            gap: 0.5rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-bar input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            border: 2px solid #2a2a4a;
            border-radius: 12px;
            background: #1a1a2e;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: #6c63ff;
        }

        .search-bar input::placeholder {
            color: #555;
        }

        .search-bar button {
            padding: 0.85rem 1.8rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #6c63ff;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .search-bar button:hover {
            background: #5a52d5;
        }

        .search-bar button:active {
            transform: scale(0.97);
        }

        .status {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            padding-bottom: 1rem;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 0 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: #1a1a2e;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2a2a4a;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.15);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .card .info {
            padding: 0.8rem 1rem;
        }

        .card .info .name {
            font-size: 0.85rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .info .score {
            font-size: 0.78rem;
            color: #6c63ff;
            margin-top: 0.3rem;
        }

        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: #555;
            font-size: 1.1rem;
        }

        .empty .icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Img<span>Seek</span></h1>
        <p>Search images using natural language powered by CLIP</p>
    </div>

    <div class="search-bar">
        <input type="text" id="query" placeholder="Describe an image... e.g. a dog playing" autofocus>
        <button onclick="search()">Search</button>
    </div>

    <div id="status" class="status"></div>
    <div id="results" class="results"></div>

    <script>
        const API = "http://127.0.0.1:8000";

        document.getElementById("query").addEventListener("keydown", e => {
            if (e.key === "Enter") search();
        });

        async function search() {
            const query = document.getElementById("query").value.trim();
            if (!query) return;

            const status = document.getElementById("status");
            const div = document.getElementById("results");

            status.textContent = "Searching...";
            div.innerHTML = "";

            try {
                const res = await fetch(`${API}/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();

                status.textContent = `Found ${data.results.length} result(s)`;

                if (data.results.length === 0) {
                    div.innerHTML = `<div class="empty"><div class="icon">&#128269;</div>No matching images found</div>`;
                    return;
                }

                data.results.forEach(img => {
                    const filename = img.path.split("/").pop();
                    const imgUrl = `${API}/${img.path}`;
                    div.innerHTML += `
            <div class="card">
              <img src="${imgUrl}" alt="${filename}" loading="lazy">
              <div class="info">
                <div class="name" title="${filename}">${filename}</div>
                <div class="score">Match: ${(img.score * 100).toFixed(1)}%</div>
              </div>
            </div>
          `;
                });
            } catch (err) {
                status.textContent = "Error connecting to server";
                console.error(err);
            }
        }
    </script>

</body>

</html>
